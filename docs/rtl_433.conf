# rtl_433.conf
# Used with pbkhrv/rtl_433-hass-addons
# Listens to all signals — all built-in decoders run + unknown signals reported

frequency     433920000
sample_rate   250000

# ──────────────────────────────────────────────────────────────────────────
# NO "protocol N" line here — this is intentional.
#
# When one or more "protocol N" lines are present, rtl_433 disables every
# other built-in decoder and only runs the listed ones.  That means a Nexa
# dimmer dim-level command (which has a slightly different frame structure
# than a plain on/off) may be classified as "unknown" even though another
# built-in decoder could have recognised it — and genuine signals from other
# brands are never decoded at all.
#
# With no "protocol" restriction, rtl_433 runs ALL built-in decoders first.
# Only signals that no decoder can handle fall through to "report_unknown".
# This gives the best of both worlds: full protocol coverage + capture of
# truly unknown frames (Nexa dim levels, proprietary remotes, etc.).
# ──────────────────────────────────────────────────────────────────────────

# Report any signal that no built-in decoder recognises (e.g. Nexa dimmer
# dim-level commands 20/40/60/80/100 %, Luxorparts, proprietary remotes).
# These appear as "Unknown" events in MQTT and in the rtl_433 HA add-on UI.
report_unknown  on

# ──────────────────────────────────────────────────────────────────────────
# Custom flex decoders for devices not built into rtl_433.
#
# Add one "decoder { ... }" block per device type.  Parameters are derived
# from the "Analyzing pulses" output produced by running rtl_433 with:
#   protocol      -1
#   analyze_pulses  true
# and pressing the remote button.  rtl_433 will print suggested -X parameters
# if it can auto-detect the modulation.
# ──────────────────────────────────────────────────────────────────────────

# Kjell & Company / MOES-OEM chain roller blind motor (issue #100)
# Verified from per-button analyze_pulses captures (2026-04-27):
#
#   Modulation: OOK_PWM with sync preamble
#     short=376 µs (bit 0), long=776 µs (bit 1), sync=1456 µs, reset=1532 µs
#     40 data bits per frame.  One button press = ~5 frame repetitions.
#     Each burst is preceded by a ~4896 µs preamble pulse before the first sync.
#
#   Confirmed button codes (hex, 10 digits = 40 bits):
#     UP   = 6c82050eee  (and rolling variant 6c82050ee1 on some presses)
#     STOP = 6c82050eaa  (confirmed from 5 clean frames)
#     DOWN = NOT YET CONFIRMED (DOWN capture had heavy RF interference;
#            the motor signal was partially captured but not fully decoded)
#
#   Payload structure:
#     Bits 0–31 (bytes 1–4): device address  = 6c82050e
#     Bits 32–39 (byte 5):   command         = ee (UP), aa (STOP), ?? (DOWN)
#     The command byte appears to be the command nibble repeated: ee=1110|1110,
#     aa=1010|1010.  DOWN is likely 66 (0110|0110) but unconfirmed.
#
#   HA automation matching example (Node-RED / HA template):
#     - received code starts with "6c82050e" → it is this motor's remote
#     - last byte "ee" → UP button pressed
#     - last byte "aa" → STOP button pressed
#     - last byte "??" → DOWN button (to be confirmed)
#
#   Duplicate suppression: each press fires ~5 identical frames; debounce for
#   500 ms in Node-RED or HA automations to fire the action only once.
decoder { name=kjell_blind, modulation=OOK_PWM, short=376, long=776, reset=1532, gap=0, sync=1456, bits>=38, tolerance=50 }

# ──────────────────────────────────────────────────────────────────────────
# Output to the Mosquitto MQTT broker.
#
# Without this line rtl_433 only prints JSON to stdout — nothing reaches HA.
# "core-mosquitto" is the HA Supervisor internal hostname for the Mosquitto
# broker add-on.  Replace with your broker's IP if it runs elsewhere.
# Add ",user=USER,pass=PASS" if your broker requires authentication.
# ──────────────────────────────────────────────────────────────────────────
output          mqtt://core-mosquitto:1883/rtl_433[/model][/id]

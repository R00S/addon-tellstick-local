# rtl_433.conf - Initial testing configuration
# Used with pbkhrv/rtl_433-hass-addons
# 
# This configuration outputs ALL detected devices to the app log first,
# allowing you to verify RTL-433 is working before enabling MQTT integration.
#
# STEP 1: Use this config to verify device detection in logs
# STEP 2: Once devices appear in logs, switch to MQTT output (see below)

frequency     433920000
sample_rate   250000

# ──────────────────────────────────────────────────────────────────────────
# PROTOCOL DETECTION - Enabled for all protocols
# ──────────────────────────────────────────────────────────────────────────
# protocol -1 = enable ALL built-in decoders (recommended for initial testing)
# This ensures any 433 MHz device will be detected and logged
protocol      -1

# Analyze pulse data for better unknown signal detection
analyze_pulses  true

# Verbose logging level (0=quiet, 1=normal, 2=verbose, 3=very verbose)
# Level 2 shows detailed decoding information in the logs
verbose       2

# ──────────────────────────────────────────────────────────────────────────
# OUTPUT CONFIGURATION - Log only (no MQTT yet)
# ──────────────────────────────────────────────────────────────────────────
# These outputs write to the rtl_433 add-on log, visible in:
# Settings → Add-ons → rtl_433 → Log

# JSON format output (one line per detected device)
output        json

# Human-readable log format
output        log

# ──────────────────────────────────────────────────────────────────────────
# AFTER VERIFYING DEVICES APPEAR IN LOGS, SWITCH TO MQTT:
# ──────────────────────────────────────────────────────────────────────────
# Comment out the two "output" lines above and uncomment this line:
# output        mqtt://core-mosquitto:1883/rtl_433[/model][/id],retain=0,qos=0
#
# Then:
# 1. Restart rtl_433 add-on
# 2. Enable "Listen for rtl_433 sensors via MQTT" in TellStick Local settings
# 3. Devices will auto-create as sensor entities in Home Assistant
# ──────────────────────────────────────────────────────────────────────────

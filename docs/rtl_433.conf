# rtl_433.conf
# Used with pbkhrv/rtl_433-hass-addons
# Listens to all signals — all built-in decoders run + unknown signals reported

frequency     433920000
sample_rate   250000

# ──────────────────────────────────────────────────────────────────────────
# NO "protocol N" line here — this is intentional.
#
# When one or more "protocol N" lines are present, rtl_433 disables every
# other built-in decoder and only runs the listed ones.  That means a Nexa
# dimmer dim-level command (which has a slightly different frame structure
# than a plain on/off) may be classified as "unknown" even though another
# built-in decoder could have recognised it — and genuine signals from other
# brands are never decoded at all.
#
# With no "protocol" restriction, rtl_433 runs ALL built-in decoders first.
# Only signals that no decoder can handle fall through to "report_unknown".
# This gives the best of both worlds: full protocol coverage + capture of
# truly unknown frames (Nexa dim levels, proprietary remotes, etc.).
# ──────────────────────────────────────────────────────────────────────────

# Report any signal that no built-in decoder recognises (e.g. Nexa dimmer
# dim-level commands 20/40/60/80/100 %, Luxorparts, proprietary remotes).
# These appear as "Unknown" events in MQTT and in the rtl_433 HA add-on UI.
report_unknown  on

# ──────────────────────────────────────────────────────────────────────────
# Output to the Mosquitto MQTT broker.
#
# Without this line rtl_433 only prints JSON to stdout — nothing reaches HA.
# "core-mosquitto" is the HA Supervisor internal hostname for the Mosquitto
# broker add-on.  Replace with your broker's IP if it runs elsewhere.
# Add ",user=USER,pass=PASS" if your broker requires authentication.
# ──────────────────────────────────────────────────────────────────────────
output          mqtt://core-mosquitto:1883/rtl_433[/model][/id]

# rtl_433.conf - Production configuration with MQTT
# Used with pbkhrv/rtl_433-hass-addons
# 
# This configuration sends detected devices to MQTT for Home Assistant integration.
#
# FOR INITIAL TESTING (before enabling MQTT):
# Replace the "output mqtt" line with:
#   output json
#   output log
# Then check Settings → Add-ons → rtl_433 → Log to verify device detection.

frequency     433920000
sample_rate   250000

# ──────────────────────────────────────────────────────────────────────────
# PROTOCOL DETECTION - Enabled for all protocols
# ──────────────────────────────────────────────────────────────────────────
# protocol -1 = enable ALL built-in decoders
# This ensures any 433 MHz device will be detected
protocol      -1

# ──────────────────────────────────────────────────────────────────────────
# OUTPUT CONFIGURATION - MQTT for Home Assistant integration
# ──────────────────────────────────────────────────────────────────────────
# Send decoded sensor data to MQTT broker
# - core-mosquitto = HA Supervisor internal hostname for Mosquitto add-on
# - retain=0 = don't store messages on disk (prevents database growth)
# - qos=0 = fire-and-forget delivery
# - /rtl_433[/model][/id] = topic structure for auto-discovery
output        mqtt://core-mosquitto:1883/rtl_433[/model][/id],retain=0,qos=0

# ──────────────────────────────────────────────────────────────────────────
# OPTIONAL: Keep verbose logging for troubleshooting
# ──────────────────────────────────────────────────────────────────────────
# Uncomment these lines to also see detailed pulse analysis in the log:
# analyze_pulses  true
# verbose         2
#
# This adds detailed pulse timing information to the rtl_433 add-on log,
# useful for debugging unknown devices or protocol issues.
# Leave commented for normal operation to reduce log clutter.
# ──────────────────────────────────────────────────────────────────────────

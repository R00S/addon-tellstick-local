# rtl_433.conf
# Used with pbkhrv/rtl_433-hass-addons
# Listens to all signals — known protocols decoded + unknown signals reported

frequency     433920000
sample_rate   250000

# Decode Nexa / Arctech selflearning signals (on/off and dim commands)
protocol      26

# ──────────────────────────────────────────────────────────────────────────
# FIX 1 — replaced "analyze_signals 1" with "report_unknown on"
#
# analyze_signals only prints timing-analysis text to the console;
# it does NOT produce decodable events and nothing is forwarded to MQTT.
#
# Nexa selflearning dimmers send a different bit structure for dim commands
# (levels 20 % / 40 % / 60 % / 80 % / 100 %) compared to plain on/off.
# When protocol 26 cannot decode such a frame it is silently dropped.
# report_unknown on turns those drops into proper "Unknown" events that
# ARE forwarded to the output below, so dim button presses become visible.
# ──────────────────────────────────────────────────────────────────────────
report_unknown on

# ──────────────────────────────────────────────────────────────────────────
# FIX 2 — added the missing output directive
#
# Without an output directive rtl_433 prints JSON to stdout only and does
# NOT publish to MQTT, so nothing ever reaches Home Assistant.
#
# "core-mosquitto" is the internal HA Supervisor hostname for the Mosquitto
# broker add-on.  Replace it with your broker IP if it runs elsewhere.
# If your broker requires authentication append the credentials:
#   mqtt://core-mosquitto:1883/rtl_433[/model][/id],user=USER,pass=PASS
# ──────────────────────────────────────────────────────────────────────────
output        mqtt://core-mosquitto:1883/rtl_433[/model][/id]

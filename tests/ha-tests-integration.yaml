# tests/ha-tests-integration.yaml
# Test scenarios for ha-dev-platform MCP run_tests tool
# These are executed against a live HA dev instance.
#
# SUPPORTED action types (verified against the live runner):
#   - call_service: params: domain, service   (no service_data support)
#   - check_state:  params: entity_id, expected_state
#
# NOTE: The Python-based integration module tests (imports, config flow, options
# flow) are covered by tests/test_ha_integration.py which runs locally via:
#   pip install homeassistant pyflakes && python tests/test_ha_integration.py
#
# NOTE: Integration-specific entity tests (check_state on switch/sensor/light
# entities) require the integration to be deployed and running on the target
# HA instance via deploy_to_ha first.

domain: tellstick_local

scenarios:
  # --- HA core health (always pass) ---

  - name: "HA core is responsive"
    description: "Verify HA is up and the REST API is reachable"
    steps:
      - action: call_service
        domain: homeassistant
        service: check_config
    expected: pass

  - name: "System log service available"
    description: "Verify system_log domain is loaded"
    steps:
      - action: call_service
        domain: system_log
        service: clear
    expected: pass

  - name: "Persistent notification service available"
    description: "Verify persistent_notification domain is loaded"
    steps:
      - action: call_service
        domain: persistent_notification
        service: dismiss_all
    expected: pass

  - name: "Reload all integrations"
    description: "Trigger homeassistant.reload_all to reload YAML-backed integrations"
    steps:
      - action: call_service
        domain: homeassistant
        service: reload_all
    expected: pass

  # --- tellstick_local integration deployment check ---

---
name: TellStick Local
version: 2.4.0.9.20260323001438
slug: tellsticklive
image: ghcr.io/r00s/tellsticklive/{arch}
description: TellStick and TellStick Duo local service (no cloud)
url: https://github.com/R00S/addon-tellsticklive-roosfork
arch:
  - aarch64
  - amd64
startup: system
init: false
stdin: true
usb: true
homeassistant_api: true
map:
  - homeassistant_config:rw
discovery:
  - tellstick_local
options:
  devices:
    - id: 1
      name: Example device
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "1"
    - id: 2
      name: Example device two
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "2"
schema:
  devices:
    - id: int(1,)
      name: str
      protocol: match(arctech|brateck|comen|everflourish|fineoffset|fuhaote|hasta|ikea|kangtai|mandolyn|oregon|risingsun|sartano|silvanchip|upm|waveman|x10|yidong)
      model: str?
      house: str?
      code: str?
      unit: str?
      fade: str?
      learn: bool?

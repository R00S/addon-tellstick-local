---
name: TellStick Local
version: 2.0.10.1-test.copilot-fix-integration-installation-issue.20260220-200221
slug: tellsticklive
image: ghcr.io/r00s/tellsticklive/{arch}
description: TellStick and TellStick Duo local service (no cloud)
url: https://github.com/R00S/addon-tellsticklive-roosfork
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: system
init: false
stdin: true
usb: true
map:
  - config:rw
discovery:
  - tellstick_local
options:
  devices:
    - id: 1
      name: Example device
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "1"
    - id: 2
      name: Example device two
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "2"
schema:
  devices:
    - id: int(1,)
      name: str
      protocol: match(arctech|brateck|comen|everflourish|fineoffset|fuhaote|hasta|ikea|mandolyn|oregon|risingsun|sartano|silvanchip|upm|waveman|x10|yidong)
      model: str?
      house: str?
      code: str?
      unit: str?
      fade: str?

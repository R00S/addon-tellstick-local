---
# Dev channel — always tracks the latest build from the `dev` branch of
# https://github.com/R00S/addon-tellstick-local
#
# version: dev  → HAOS Supervisor pulls the :dev Docker image tag,
#                 which is rebuilt on every push to the dev branch.
# slug: tellsticklive-dev  → different from stable (tellsticklive) so both
#                            can be installed side-by-side for testing.
name: TellStick Local (Dev)
version: dev
slug: tellsticklive-dev
image: ghcr.io/r00s/tellsticklive/{arch}
description: >-
  TellStick Local dev channel — latest unreleased features from the dev
  branch. May be unstable. For the stable release use addon-tellstick-local.
url: https://github.com/R00S/addon-tellstick-local-dev
arch:
  - aarch64
  - amd64
startup: system
init: false
stdin: true
usb: true
homeassistant_api: true
map:
  - homeassistant_config:rw
discovery:
  - tellstick_local
options:
  devices:
    - id: 1
      name: Example device
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "1"
    - id: 2
      name: Example device two
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "2"
schema:
  devices:
    - id: int(1,)
      name: str
      protocol: match(arctech|brateck|comen|everflourish|fineoffset|fuhaote|hasta|ikea|kangtai|mandolyn|oregon|risingsun|sartano|silvanchip|upm|waveman|x10|yidong)
      model: str?
      house: str?
      code: str?
      unit: str?
      fade: str?
      learn: bool?

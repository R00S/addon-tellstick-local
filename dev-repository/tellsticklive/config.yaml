---
# Dev channel — always tracks the latest build from the `dev` branch of
# https://github.com/R00S/addon-tellstick-local
#
# This repository lives at https://github.com/R00S/addon-tellsticklive-roosfork
# (the old stable path) so that existing users who already have it added to HAOS
# continue to receive updates automatically, instead of being orphaned.
#
# version: dev  → HAOS Supervisor pulls the :dev Docker image tag,
#                 which is rebuilt on every push to the dev branch.
# slug: tellsticklive  → same as the old stable slug so HAOS treats each
#                        new edge build as an update to the already-installed app.
name: TellStick Local
version: dev
slug: tellsticklive
image: ghcr.io/r00s/tellstick-local/{arch}
description: >-
  ⚠️ You are on the DEV channel (addon-tellsticklive-roosfork). This channel
  receives the latest unreleased features and may be unstable. For the stable
  release, switch your HAOS repository to
  https://github.com/R00S/addon-tellstick-local — see the README for details.
url: https://github.com/R00S/addon-tellsticklive-roosfork
arch:
  - aarch64
  - amd64
startup: system
init: false
stdin: true
usb: true
homeassistant_api: true
map:
  - homeassistant_config:rw
discovery:
  - tellstick_local
options:
  devices:
    - id: 1
      name: Example device
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "1"
    - id: 2
      name: Example device two
      protocol: everflourish
      model: selflearning-switch
      house: A
      unit: "2"
schema:
  devices:
    - id: int(1,)
      name: str
      protocol: match(arctech|brateck|comen|everflourish|fineoffset|fuhaote|hasta|ikea|kangtai|mandolyn|oregon|risingsun|sartano|silvanchip|upm|waveman|x10|yidong)
      model: str?
      house: str?
      code: str?
      unit: str?
      fade: str?
      learn: bool?

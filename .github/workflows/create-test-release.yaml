---
# Updated: 2026-02-20 for addon-tellsticklive-roosfork
name: Create Test Release

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - test
          - beta
          - rc
        default: test
      version_suffix:
        description: Version suffix (e.g., branch name or identifier)
        required: false
        type: string

jobs:
  create-test-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get current branch name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          # Sanitize branch name for use in version (replace / with -)
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "safe_name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Extract version from manifest
        id: version
        env:
          INPUT_VERSION_SUFFIX: ${{ github.event.inputs.version_suffix }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          SAFE_BRANCH: ${{ steps.branch.outputs.safe_name }}
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' custom_components/tellstick_local/manifest.json)
          echo "base=$VERSION" >> "$GITHUB_OUTPUT"

          SUFFIX="${INPUT_VERSION_SUFFIX}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="${SAFE_BRANCH}"
          fi

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          case "$INPUT_RELEASE_TYPE" in
            test)
              TEST_VERSION="${VERSION}-test.${SUFFIX}.${TIMESTAMP}"
              ;;
            beta)
              TEST_VERSION="${VERSION}-beta.${SUFFIX}"
              ;;
            rc)
              TEST_VERSION="${VERSION}-rc.${SUFFIX}"
              ;;
            *)
              TEST_VERSION="${VERSION}-test.${SUFFIX}.${TIMESTAMP}"
              ;;
          esac

          echo "test=$TEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${TEST_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json with test version
        env:
          TEST_VERSION: ${{ steps.version.outputs.test }}
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${TEST_VERSION}\"/" \
            custom_components/tellstick_local/manifest.json
          cat custom_components/tellstick_local/manifest.json

      - name: Create release archive
        env:
          TEST_VERSION: ${{ steps.version.outputs.test }}
        run: |
          cd custom_components
          zip -r "../tellstick-local-${TEST_VERSION}.zip" tellstick_local/
          cd ..

      - name: Generate release notes
        id: release_notes
        env:
          TEST_VERSION: ${{ steps.version.outputs.test }}
          BASE_VERSION: ${{ steps.version.outputs.base }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          REPO: ${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
        run: |
          cat > release_notes.md << EOF
          # 🧪 Test Release: ${TEST_VERSION}

          **⚠️ This is a TEST release from branch \`${BRANCH_NAME}\`**

          This release is for testing purposes only and has NOT been merged to the main branch.

          ## Installation via HACS

          1. In HACS, go to Integrations
          2. Click the three dots in the top right corner
          3. Select "Custom repositories"
          4. Add this repository URL: \`https://github.com/${REPO}\`
          5. Select category: "Integration"
          6. Click "Add"
          7. Find "TellStick Local" and install version \`${TEST_VERSION}\`
          8. Restart Home Assistant

          ## Add-on installation

          Make sure the **TellStick Local** add-on is installed and running from this repository:
          \`https://github.com/${REPO}\`

          The add-on exposes the \`telldusd\` daemon over TCP on ports **50800** (commands)
          and **50801** (events). The custom integration connects to those ports.

          ## What's Included

          This test release includes all changes from the \`${BRANCH_NAME}\` branch:

          - Latest commit: \`${GIT_SHA}\`
          - Base version: \`${BASE_VERSION}\`
          - Release type: \`${RELEASE_TYPE}\`

          ## Testing Instructions

          1. Install the **TellStick Local** add-on and start it
          2. Install this integration version via HACS
          3. Restart Home Assistant
          4. Add the **TellStick Local** integration via Settings → Devices & Services
          5. Enter the hostname shown in the add-on log and accept the default ports (50800 / 50801)
          6. Enable **Automatically add new devices** in the integration options
          7. Press a 433 MHz remote/button to pair a device
          8. Report any issues on the PR or as GitHub issues

          ## Recent Commits

          $(git log --oneline -10)

          ---

          **Note:** Once testing is complete and issues are resolved, these changes will be
          merged to main and a production release will be created.
          EOF

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9571a6dabefd0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Test Release ${{ steps.version.outputs.test }}"
          body_path: release_notes.md
          files: tellstick-local-${{ steps.version.outputs.test }}.zip
          draft: false
          prerelease: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        env:
          TEST_VERSION: ${{ steps.version.outputs.test }}
          TEST_TAG: ${{ steps.version.outputs.tag }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          REPO: ${{ github.repository }}
        run: |
          echo "## 🎉 Test Release Created!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${TEST_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${TEST_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`${BRANCH_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Type:** \`${RELEASE_TYPE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Installation" >> "$GITHUB_STEP_SUMMARY"
          echo "This release can now be installed via HACS." >> "$GITHUB_STEP_SUMMARY"
          echo "HACS will automatically detect this version." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release URL" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${REPO}/releases/tag/${TEST_TAG}" >> "$GITHUB_STEP_SUMMARY"

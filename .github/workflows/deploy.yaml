---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      version:
        description: Release version (without v prefix)
        required: true
        type: string
      architectures:
        description: >-
          JSON array of architectures to build
          (default: all from config.yaml)
        required: false
        type: string
        default: ""
      is_stable:
        description: >-
          Set to true when called from create-stable-release so that
          post-build publishes the real version back to this repository.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  information:
    name: Gather app information
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.information.outputs.architectures }}
      build: ${{ steps.information.outputs.build }}
      description: ${{ steps.information.outputs.description }}
      is_stable: ${{ steps.stable.outputs.is_stable }}
      name: ${{ steps.information.outputs.name }}
      owner: ${{ steps.owner.outputs.owner }}
      slug: ${{ steps.information.outputs.slug }}
      target: ${{ steps.information.outputs.target }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run app information action
        id: information
        uses: frenck/action-addon-information@ce1377e9851cf569c29329e65fb2c57e67ca0f69
      - name: 🔡 Lowercase repository owner for Docker tags
        id: owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: 🏷 Extract release version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: 🔒 Determine if this is a stable release
        id: stable
        env:
          IS_STABLE_INPUT: ${{ inputs.is_stable }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          # Stable if: (1) is_stable input is true (from create-stable-release),
          # OR (2) triggered by a non-prerelease GitHub release event.
          # Test/beta/rc releases must NEVER tag :latest or update config.yaml.
          if [[ "${IS_STABLE_INPUT}" == "true" ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          elif [[ "${EVENT_NAME}" == "release" && "${IS_PRERELEASE}" != "true" ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.architecture }}
    needs:
      - information
    runs-on: ${{ matrix.architecture == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      packages: write
    strategy:
      matrix:
        architecture: >-
          ${{ fromJson(inputs.architectures
              || needs.information.outputs.architectures) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 📦 Bundle integration into add-on build context
        env:
          TARGET: ${{ needs.information.outputs.target }}
        run: |
          mkdir -p "${TARGET}/rootfs/usr/share/tellstick_local"
          cp -r custom_components/tellstick_local/. \
            "${TARGET}/rootfs/usr/share/tellstick_local/"
      - name: 🏷 Set release version in config.yaml
        env:
          TARGET: ${{ needs.information.outputs.target }}
          VERSION: ${{ needs.information.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "${TARGET}/config.yaml"
      - name: 🏗 Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ℹ️ Compose build flags
        id: flags
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          BUILD_FILE: ${{ needs.information.outputs.build }}
        run: |
          echo "date=$(date +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          from=$(yq --no-colors eval ".build_from.${ARCHITECTURE}" "${BUILD_FILE}")
          echo "from=${from}" >> "$GITHUB_OUTPUT"

          if [[ "${ARCHITECTURE}" = "amd64" ]]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "aarch64" ]]; then
            echo "platform=linux/arm64/v8" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "armv7" ]]; then
            echo "platform=linux/arm/v7" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "armhf" ]]; then
            echo "platform=linux/arm/v6" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "i386" ]]; then
            echo "platform=linux/386" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Could not determine platform for architecture ${ARCHITECTURE}"
            exit 1
          fi
      - name: 🏷 Compute Docker tags
        id: docker_tags
        env:
          OWNER: ${{ needs.information.outputs.owner }}
          SLUG: ${{ needs.information.outputs.slug }}
          ARCH: ${{ matrix.architecture }}
          VERSION: ${{ needs.information.outputs.version }}
          IS_STABLE: ${{ needs.information.outputs.is_stable }}
        run: |
          BASE="ghcr.io/${OWNER}/${SLUG}/${ARCH}"
          # Always tag with the version
          TAGS="${BASE}:${VERSION}"
          # Only tag :latest for stable releases — test/beta/rc builds must
          # NEVER overwrite :latest or users on the stable channel will get
          # unreleased code.
          if [[ "${IS_STABLE}" == "true" ]]; then
            printf -v TAGS '%s\n%s' "${TAGS}" "${BASE}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${TAGS}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: 🚀 Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          push: true
          # zizmor: ignore[template-injection] - path input to action, not shell-executed
          context: ${{ needs.information.outputs.target }}
          file: ${{ needs.information.outputs.target }}/Dockerfile
          platforms: ${{ steps.flags.outputs.platform }}
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            BUILD_ARCH=${{ matrix.architecture }}
            BUILD_DATE=${{ steps.flags.outputs.date }}
            BUILD_DESCRIPTION=${{ needs.information.outputs.description }}
            BUILD_FROM=${{ steps.flags.outputs.from }}
            BUILD_NAME=${{ needs.information.outputs.name }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ needs.information.outputs.version }}

  post-build:
    name: Publish release version to repository
    # Only run for STABLE releases.  Uses the is_stable output which checks
    # both the workflow_call input AND the release event prerelease flag.
    # Test/beta/rc releases must NEVER update config.yaml on main — doing so
    # would push unreleased versions to all stable-channel users.
    if: needs.information.outputs.is_stable == 'true'
    needs:
      - information
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
      - name: 🏷 Publish release version to repository
        env:
          TARGET: ${{ needs.information.outputs.target }}
          VERSION: ${{ needs.information.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "${TARGET}/config.yaml"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "${TARGET}/config.yaml"
          if ! git diff --cached --quiet; then
            git commit -m "🔖 Release v${VERSION} [skip ci]"
            git pull --rebase origin main
            git push
          fi

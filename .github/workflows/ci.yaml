---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  information:
    name: Gather app information
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.information.outputs.target }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run app information action
        id: information
        uses: frenck/action-addon-information@ce1377e9851cf569c29329e65fb2c57e67ca0f69

  lint-app:
    name: Lint App
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🔧 Set version to dev for linter
        env:
          TARGET: ${{ needs.information.outputs.target }}
        run: |
          # The addon-linter requires version: dev on non-tagged commits.
          # On main, config.yaml has the real release version (e.g. 2.4.11.0)
          # which is correct for HAOS but would fail the linter.
          # Temporarily set it to dev so the linter passes without requiring
          # config.yaml on main to actually say "dev".
          sed -i 's/^version:.*/version: dev/' "${TARGET}/config.yaml"
      - name: 🚀 Run App Lint
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb
        with:
          community: true
          path: "./${{ needs.information.outputs.target }}"

  lint-hadolint:
    name: Hadolint
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run Hadolint
        uses: brpaz/hadolint-action@c27bd9edc1e95eed30474db8f295ff5807ebca14
        with:
          dockerfile: "./${{ needs.information.outputs.target }}/Dockerfile"

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run JQ
        run: |
          shopt -s globstar nullglob
          for file in **/*.json; do
            if ! jq '.' "$file" > /dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON in ${file}"
              jq '.' "$file"
              exit 1
            fi
          done

  lint-shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run Shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: -s bash

  lint-yamllint:
    name: YAMLLint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🚀 Run YAMLLint
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47

  lint-integration-versions:
    name: Integration version sync
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: 🔍 Verify both manifest.json files have the same version
        run: |
          SRC="custom_components/tellstick_local/manifest.json"
          BUNDLED="tellsticklive/rootfs/usr/share/tellstick_local/manifest.json"
          SRC_VER=$(jq -r '.version' "${SRC}")
          BUNDLED_VER=$(jq -r '.version' "${BUNDLED}")
          echo "custom_components version : ${SRC_VER}"
          echo "bundled version           : ${BUNDLED_VER}"
          if [ "${SRC_VER}" != "${BUNDLED_VER}" ]; then
            echo "::error::Integration manifest versions are out of sync!"
            echo "::error::  ${SRC}: ${SRC_VER}"
            echo "::error::  ${BUNDLED}: ${BUNDLED_VER}"
            echo "::error::Bump both files to the same version."
            exit 1
          fi
          echo "✅ Versions match: ${SRC_VER}"
